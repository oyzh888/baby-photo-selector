name: Submit to TestFlight

on:
  workflow_dispatch:

jobs:
  submit:
    name: EAS Submit to TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout baby-photo-selector branch
        uses: actions/checkout@v4
        with:
          ref: baby-photo-selector

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write ASC API Key
        run: echo "${{ secrets.EXPO_ASC_API_KEY_ADMIN }}" > /tmp/AuthKey_admin.p8

      - name: Submit latest build to TestFlight
        run: |
          eas submit \
            --platform ios \
            --profile production \
            --latest \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID_ADMIN }}
          EXPO_ASC_API_ISSUER_ID: ${{ secrets.EXPO_ASC_API_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: /tmp/AuthKey_admin.p8
