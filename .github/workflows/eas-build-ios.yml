name: EAS Build iOS (Preview)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      submit:
        description: 'Submit to TestFlight after build?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout baby-photo-selector branch
        uses: actions/checkout@v4
        with:
          ref: baby-photo-selector

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Init EAS project
        run: eas init --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Decode local credentials into project directory
        run: |
          mkdir -p certs
          echo "${{ secrets.IOS_DIST_P12_BASE64 }}" | base64 -d > certs/distribution.p12
          echo "${{ secrets.IOS_PROFILE_BASE64 }}" | base64 -d > certs/app_store.mobileprovision
          echo "✅ Credentials decoded"
          openssl pkcs12 -in certs/distribution.p12 -passin pass:easbuild -nokeys 2>/dev/null | grep subject

      - name: Write ASC API Key
        run: echo "${{ secrets.EXPO_ASC_API_KEY_ADMIN }}" > /tmp/AuthKey_admin.p8

      - name: Build iOS and auto-submit to TestFlight
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --wait \
            ${{ github.event.inputs.submit == 'true' && '--auto-submit' || '' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID_ADMIN }}
          EXPO_ASC_API_ISSUER_ID: ${{ secrets.EXPO_ASC_API_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: /tmp/AuthKey_admin.p8
