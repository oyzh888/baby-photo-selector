name: EAS Build iOS (Preview)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout baby-photo-selector branch
        uses: actions/checkout@v4
        with:
          ref: baby-photo-selector

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Init EAS project
        run: eas init --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Decode local credentials
        run: |
          echo "${{ secrets.IOS_DIST_P12_BASE64 }}" | base64 -d > /tmp/distribution.p12
          echo "${{ secrets.IOS_PROFILE_BASE64 }}" | base64 -d > /tmp/app_store.mobileprovision
          echo "✅ Credentials decoded"
          openssl pkcs12 -in /tmp/distribution.p12 -passin pass:easbuild -nokeys 2>/dev/null | grep subject

      - name: Build iOS with EAS (local credentials)
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build queued
        run: |
          echo "✅ iOS build queued on EAS!"
          echo "Monitor: https://expo.dev/accounts/jackshuhui/projects/baby-photo-selector/builds"
